<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>FocusFlow</title>

<link rel="stylesheet" href="style.css"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#00ff88"/>

</head>

<body>

<div class="topbar">
  <h1>FocusFlow</h1>
  <div class="level">Lvl <span id="level">1</span></div>
</div>

<div class="xpbar">
  <div id="xpFill"></div>
</div>

<!-- SWIPE TABS -->
<div class="tabs">

  <div class="tab" id="homeTab">

    <h2>Today</h2>

    <div class="inputRow">
      <input id="taskInput" placeholder="Add a goal..."/>
      <button onclick="addTask()">+</button>
    </div>

    <div id="taskList"></div>

  </div>

  <div class="tab hidden" id="trendingTab">
    <h2>🔥 Trending Goals</h2>
    <div id="trending"></div>
  </div>

  <div class="tab hidden" id="rewardsTab">
    <h2>🎁 Rewards</h2>
    <div id="rewards"></div>
  </div>

  <div class="tab hidden" id="accountTab">
    <h2>👤 Account</h2>

    <div class="card">
      <p>Max Streak: <span id="maxStreak">0</span></p>
      <p>Total Completed: <span id="totalCompleted">0</span></p>
    </div>

    <div class="card">
      <label>Daily Reset Time</label>
      <input type="time" id="resetTime"/>
      <button onclick="saveSettings()">Save</button>
    </div>

    <button class="danger" onclick="resetAll()">Reset Everything</button>

  </div>

</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showTab('homeTab')">Home</button>
  <button onclick="showTab('trendingTab')">Trending</button>
  <button onclick="showTab('rewardsTab')">Rewards</button>
  <button onclick="showTab('accountTab')">Account</button>
</div>

<script src="script.js"></script>

</body>
</html>
